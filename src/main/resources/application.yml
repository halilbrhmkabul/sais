server:
  port: 8080
  servlet:
    context-path: /sais
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: Sosyal Yardım Bilgi Sistemi
  
  banner:
    charset: UTF-8
  
  messages:
    encoding: UTF-8
  
  # Multipart File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
      file-size-threshold: 2KB
    
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/orclpdb
    username: SAIS_USER
    password: Sais_PDB_123
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SaisHikariPool

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    properties:
      hibernate:
        # Oracle Dialect
        dialect: org.hibernate.dialect.Oracle12cDialect
        default_schema: SAIS_USER
        globally_quoted_identifiers: true

        # SQL Formatting
        format_sql: true
        use_sql_comments: true
        highlight_sql: true

        # JDBC & Batch Settings (Oracle Optimized)
        jdbc:
          charset: UTF-8
          batch_size: 20
          fetch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

        # Connection Handling
        connection:
          provider_disables_autocommit: false

        # Schema Generation (Oracle specific)
        hbm2ddl:
          import_files_sql_extractor: org.hibernate.tool.hbm2ddl.MultipleLinesSqlCommandExtractor

        # Performance Optimizations
        query:
          in_clause_parameter_padding: true

        # Sequence Generation Strategy (Oracle)
        id:
          new_generator_mappings: true

        # Statistics (Development)
        generate_statistics: false

        # Cache (disabled for now)
        cache:
          use_second_level_cache: false
          use_query_cache: false
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true  
  
  sql:
    init:
      mode: always
      data-locations: classpath:database/master-data.sql
      continue-on-error: true
      encoding: UTF-8
    
  web:
    resources:
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/


joinfaces:
  faces:
    project-stage: Development
    facelets:
      skip-comments: true
    state-saving-method: server
    default-charset: UTF-8
  primefaces:
    theme: saga
    font-awesome: true
  mojarra:
    enable-standalone: true
    

file:
  storage:
    upload-dir: uploads
    muracaat-dir: muracaat
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif,xls,xlsx,txt
    max-file-size: 10485760  # 10MB in bytes

logging:
  level:
    com.sais: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework: INFO
    org.primefaces: INFO
    org.springframework.jdbc.datasource.init: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  charset:
    console: UTF-8
